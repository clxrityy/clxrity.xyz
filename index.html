<!DOCTYPE HTML>
<html lang="en">

  <head>
    <title>clxrity</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  </head>
  <style>
    body {
      /* background image */
      background-image: url('https://i.gyazo.com/2b7edf9f2c841b71263852bcbe949639.gif');
    }

    h1 {
      /* heading */
      color: #0d9c9b;
      font-size: 300%;
      font-family: Tahoma;
      text-align: right;
      text-shadow: 1px 1px 2px white, 0 0 25px black, 0 0 5px purple;
    }

    h2 {
      /* links header */
      color: #0d9c9b;
      font-size: 300%;
      font-family: Tahoma;
      text-align: center;
      text-shadow: 1px 1px 2px white, 0 0 25px black, 0 0 5px purple;
    }

    .container>* {
      /* first container */
      display: inline-block;
    }

    p1 {
      /* clxrity tab */
      color: #0d9c9b;
      font-size: 200%;
      font-family: tahoma;
      text-align: right;
      text-shadow: 1px 1px 2px blue, 0 0 25px white;
    }

    .tab {
      /* tab for p1 */
      margin-left: 20px;
    }

    /* nav bar */

    ul {
      /* navigation bar */
      list-style-type: none;
      margin: 1;
      padding: 2;
      overflow: hidden;
      font-family: tahoma;
      background-image: linear-gradient(180deg, #7f7fd1, #353579);
    }

    #borderimg1 {
      /* nav bar border */
      border: 10px solid transparent;
      padding: 12.5px;
      border-image: url(https://wallpaperboat.com/wp-content/uploads/2019/10/cool-green-06.jpg) 50 round;
    }

    li {
      /* lining */
      float: right;
    }

    li a:hover:not(.active) {
      background-color: #3f4e4b;
    }

    .active {
      background-color: #2e8d80;
    }

  </style>

  <body>
    <ul id="borderimg1">
      <li style="float:right">
        <p1><b>clxrity</b></p1>
      </li>
    </ul>


    <div class="container">
      <h2>
        links
      </h2>
      <img src="https://imgur.com/ECJFUYX.png" width="150" height="150" align="left">
    </div>
  </body>

</html>
